<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QC Feedback Tool</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="container">
  <h1>QC Feedback Tool</h1>

  <label>Document Name</label>
  <input type="text" id="documentNameInput" placeholder="Document for ...">

  <label>QA Name</label>
  <input type="text" id="qaNameInput" placeholder="Enter your name">

  <hr>

  <label>Error</label>
  <input type="text" id="errorInput" placeholder="Enter error">

  <label>JID</label>
  <input type="text" id="jidInput" placeholder="Enter JID">

  <label>Paste Screenshot(s)</label>
  <div id="pasteArea" contenteditable="true" style="border:2px dashed #9ca3af; min-height:100px; padding:20px; text-align:center;">
    Paste screenshots here (Ctrl + V)
  </div>

  <!-- <button id="addErrorBtn">Add Error</button>
  <button id="removeAllBtn" class="remove-all">Remove All Errors</button>

  <h2>Errors Added</h2>
  <div id="errorsContainer"></div>

  <button id="downloadPDFBtn" class="download">Download Feedback PDF</button> -->
<!-- Error Buttons -->
<div class="button-wrapper">
  <button id="addErrorBtn" class="primary">Add Error</button>
  <button id="removeAllBtn" class="remove-all">Remove All Errors</button>
</div>

<h2>Errors Added</h2>
<div id="errorsContainer"></div>

<!-- Download Button -->
<div class="button-wrapper">
  <button id="downloadPDFBtn" class="download">Download Feedback PDF</button>
</div>

  
</div>

<!-- Confirm popup -->
<div id="confirmPopup" class="popup">
  <div class="popup-content">
    <p id="confirmMessage"></p>
    <button id="confirmBtn">Confirm</button>
    <button onclick="cancelRemove()">Cancel</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
